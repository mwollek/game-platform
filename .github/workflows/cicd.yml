name: CI/CD

on:
    pull_request:
    push:

concurrency:
    group: cicd-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: CI (lint + test + build)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Restore Next.js build cache
              uses: actions/cache@v4
              with:
                  path: .next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}', 'next.config.ts') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm run test

            - name: Build
              run: npm run build

    # Deploy only on pushes to main (not on PRs or other branches).
    cd:
        name: CD (placeholder)
        runs-on: ubuntu-latest
        needs: ci
        if: github.event_name == 'push' && github.ref_name == 'main'

        steps:
            - name: Deployment placeholder
              run: 'echo "CD placeholder: here we''ll deploy to Vercel later."'
