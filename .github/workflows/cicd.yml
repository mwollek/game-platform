name: CI/CD

on:
    pull_request:
    push:

# Scope by branch: push runs group per ref_name; PR runs per PR number + head branch
# (github.ref on pull_request is refs/pull/N/merge, not the source branch name).
concurrency:
    group: cicd-${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.event.pull_request.number, github.head_ref) || format('push-{0}', github.ref_name) }}
    cancel-in-progress: true

jobs:
    ci:
        name: CI (lint + test + build)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Restore Next.js build cache
              uses: actions/cache@v4
              with:
                  path: .next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}', 'next.config.ts') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm run test

            - name: Build
              env:
                  AUTH_SECRET: ci-build-auth-secret-at-least-32-characters-long
                  DATABASE_URL: postgresql://gameplatform:gameplatform@localhost:5432/gameplatform
              run: npm run build

    # Deploy only on pushes to main (not on PRs or other branches).
    cd:
        name: CD (placeholder)
        runs-on: ubuntu-latest
        needs: ci
        if: github.event_name == 'push' && github.ref_name == 'main'

        steps:
            - name: Deployment placeholder
              run: 'echo "CD placeholder: here we''ll deploy to Vercel later."'
