name: CI/CD

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    ci-quality:
        name: CI
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm run test

    ci-build:
        name: CI (build)
        runs-on: ubuntu-latest
        needs: ci-quality

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

    cd:
        name: CD (placeholder)
        runs-on: ubuntu-latest
        needs: ci-build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Deployment placeholder
              run: 'echo "CD placeholder: here we''ll deploy to Vercel later."'
