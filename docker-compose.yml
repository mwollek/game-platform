services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: gameplatform
            POSTGRES_PASSWORD: gameplatform
            POSTGRES_DB: gameplatform
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U gameplatform -d gameplatform"]
            interval: 5s
            timeout: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            NODE_ENV: production
            DATABASE_URL: postgresql://gameplatform:gameplatform@postgres:5432/gameplatform
            AUTH_SECRET: dev-docker-auth-secret-replace-in-real-deployments-min-32-chars
            AUTH_URL: http://localhost:3000

volumes:
    postgres_data:
