name: game-platform-dev

services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: gameplatform
            POSTGRES_PASSWORD: gameplatform
            POSTGRES_DB: gameplatform
        ports:
            - "5432:5432"
        volumes:
            - postgres_dev_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U gameplatform -d gameplatform"]
            interval: 5s
            timeout: 5s
            retries: 5

    app-dev:
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - "3000:3000"
        volumes:
            - .:/app
            - app_dev_node_modules:/app/node_modules
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: "true"
            CHOKIDAR_USEPOLLING: "true"
            CHOKIDAR_INTERVAL: "500"
            DATABASE_URL: postgresql://gameplatform:gameplatform@postgres:5432/gameplatform
            AUTH_SECRET: dev-docker-auth-secret-replace-in-real-deployments-min-32-chars
            AUTH_URL: http://localhost:3000
        stdin_open: true
        tty: true

volumes:
    app_dev_node_modules:
    postgres_dev_data:
